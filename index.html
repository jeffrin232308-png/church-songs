<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Church Songs</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1d2671,#c33764);
margin:0;
color:white;
text-align:center;
}

.page{
display:none;
padding:40px;
}

.active{
display:block;
}

/* buttons */

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#ffd700;
font-size:16px;
cursor:pointer;
}

button:hover{
background:white;
}

/* song box */

.songBox{
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:10px;
margin-top:20px;
white-space:pre-line;
font-size:18px;
}

.title{
font-size:28px;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page active">

<h1 class="title">✨ Church Worship Songs ✨</h1>

<p>Click below to view the worship songs</p>

<button onclick="openPage(2)">Click Me</button>

</div>


<!-- PAGE 2 -->

<div id="page2" class="page">

<h1>Song Categories</h1>

<h2>Bible Reading Songs</h2>
<button onclick="showSong('b1')">Song 1</button>
<button onclick="showSong('b2')">Song 2</button>
<button onclick="showSong('b3')">Song 3</button>

<br><br>

<h2>பாவ அறிக்கை</h2>

<button onclick="showSong('p1')">Song 1</button>
<button onclick="showSong('p2')">Song 2</button>
<button onclick="showSong('p3')">Song 3</button>
<button onclick="showSong('p4')">Song 4</button>
<button onclick="showSong('p5')">Song 5</button>
<button onclick="showSong('p6')">Song 6</button>

<br><br>

<button onclick="openPage(1)">Back</button>

</div>


<!-- PAGE 3 -->

<div id="page3" class="page">

<h1>Song Lyrics</h1>

<div id="lyrics" class="songBox"></div>

<br>
<button onclick="openPage(2)">Back</button>

</div>


<script>

function openPage(num){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("page"+num).classList.add("active");

}


/* SONG DATABASE */

const songs={

b1:`வேதப் பிரியர் தேவப் புதல்வர்
சேதமடையா நடத்திடுவார்
இலைகள் உதிரா மரங்கள் போல
இவர்கள் நல்ல கனி தருவார்

நித்தம் விரும்பும் கர்த்தர் வசனம்
சுத்த பசும்பொன் தெளிந்திடும் தேன்
இதயம் மகிழும் கண்கள் தெளியும்
இருண்ட ஆத்துமா உயிரடையும்

வானம் அகலும் பூமி அழியும்
வேத வசனம் நிலைத்திருக்கும்
பரமன் வேதம் எனது செல்லவம்
பரவசம் நிதம் அருளும்`,

b2:`வாலிபர் தமக்கூண் அதுவாகும்
வயோதியர்க்கும் அதுணவாகும்
பாலகர்க்கினிய பாலும் அதாம்
படிமீ தாத்மபசி தணிக்கும்

சத்துருப் பேயுடன் அமர்புரியும்
தருணம் அதுநல் ஆயுதமாம்
புத்திரர் மித்திரரோடு மகிழும்
பொழுதும் அதுநல் உறவாகும்

மாந்தர் ரக்ஷிப்படையும் வழி வழுத்தும்
தேவ வார்த்தை அது
வேந்தர் அமைச்சர் முதலெவர்க்கும்
விசித்த பிரமாணமும் அதுவே`,

b3:`பாதைக்கு தீபமே
பாவிக்கு லாபமே
பேதைக்குத் திரவியமே
பரிசுத்த ஆகமம்

தேனின் மதுரமே
திவ்ய அமுதமே
வான பிதாவின் வாக்கே
பரிசுத்த ஆகமம்

எல்லையில்லா விஸ்தாரம்
எவர்க்கும் பர மாகரம்
வல்ல பரனின் வேதம்
ஆகமம்`,

p1:`நீங்காத பாவம் நீங்காத தேனோ
நீங்கிடும் நாள் தான் இதோ
பாவியை ஒருபோதும் தள்ளாத நேசர்
வாவென்று அழைக்கிறார்

காணாத ஆட்டை தேடிடும் மேய்ப்பர்
கண்டுன்னைச் சேர்த்திடுவார்
பாவியை ஒருபோதும் தள்ளாத நேசர்
வாவென்று அழைக்கிறார்

நினையாத நேரம் மரணம் சந்தித்தால்
எங்கு நீ சென்றிடுவாய்
பாவியை ஒருபோதும் தள்ளாத நேசர்
வாவென்று அழைக்கிறார்`,

p2:`முள்ளும் புதரும் காடும் மழையும்
உள்ளம் உடைந்தேசு தேடுகின்றார்
சிற்றின்ப சேற்றினில் சிக்கினதால்
சாத்தான் வலையில் நீ சிறையாகினாய்

என்னென்ன துன்பம் தொல்லைகள் வந்தும்
இயேசுவின் பாதை நீ விட்டோடாதே
நீதி நிறைந்த தம் கரங்களை
நீட்டி உன்னை தாங்கி பயம் நீக்குவார்

காணாத ஆட்டின் பின்னே – கர்த்தர்
கண்ணீருடன் அலைந்தார்
அன்போடு உன்னை அழைக்கின்றாரே
இன்றே திரும்பி நீ வா`,

p3:`என் கைகள் பாவங்கள் செய்திட்டால்
தம் கையின் காயங்கள் பார்க்கின்றாரே
தீய வழியில் என் கால்கள் சென்றால்
தம் காலின் காயங்கள் பார்க்கின்றாரே

சிலுவை நாதர் இயேசுவின்
பேரொளி வீசிடும் தூயக் கண்கள்
என்னை நோக்கிப் பார்க்கின்றன
தம் காயங்களையும் பார்க்கின்றன`,

p4:`பாவத்தினால் சாப ரோகத்தால் தொய்ந்து
மாயையில் ஆழ்ந்து மடிந்திடுவானேன்
பாவத்தைப் போக்கிடும் தூய உதிரத்தின்
ஜீவ ஊற்றில் மூழ்கி மீட்புறாயோ

வாசலண்டை நின்று ஆசையாய் தட்டும்
நேசர் இயேசுவுக்குன்னுள்ளம் திறவாயோ
பாவியை ஒருபோதும் தள்ளாத நேசர்
வாவென்று உன்னை அழைக்கிறாரே`,

p5:`வானம் பூமி படைத்திருந்தும்
வாடினேன் உன்னை இழந்ததினால்
தேடி இரட்சிக்க பிதா என்னை
அனுப்பிடவே ஓடிவந்தேன் மானிடனாய்

பாவத்தின் அகோரத்தை பார்
பாதகத்தின் முடிவினை பார்
பரிகாச சின்னமாய் சிலுவையிலே
பலியான பாவி உனக்காய்

என்னை நேசிக்கின்றாயா
என்னை நேசிக்கின்றாயா
கல்வாரி காட்சியை கண்டபின்னும்
நேசியாமல் இருப்பாயா`,

p6:`தீமை செய்ய நாடுதென்றன்
திருக்கு நெஞ்சமே – மருள்
தீர்க்கும் தஞ்சமே

தீய மனதை மாற்ற வாரும்
தூய ஆவியே
கன நேய ஆவியே`

}

function showSong(id){

document.getElementById("lyrics").innerText=songs[id];

openPage(3);

}

</script>

</body>
</html>
